name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

jobs:
  hotpaths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run local hot-path benchmarks
        run: python scripts/bench_hotpaths.py
